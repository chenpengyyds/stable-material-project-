<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>材料数据库- 精准检索版</title>
    <script src="https://3Dmol.org/build/3Dmol-min.js" defer></script>
    <style>
        :root { 
            --primary: #1890ff; 
            --primary-hover: #40a9ff;
            --bg: #f0f2f5; 
            --success: #52c41a; 
            --text: #262626;
            --border: #d9d9d9;
        }
        
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: var(--text); }

        .main-card { width: 95vw; max-width: 1600px; height: 95vh; background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); padding: 25px 35px; display: flex; flex-direction: column; overflow: hidden; }
        h1 { text-align: center; color: #001529; margin: 0 0 15px 0; font-size: 24px; font-weight: 700; }

        /* === 元素周期表 === */
        .ptable-container { background: #fbfbfb; border: 1px solid #eaeaea; border-radius: 10px; padding: 12px; margin-bottom: 15px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); overflow-x: auto; }
        .ptable-title { text-align: center; font-size: 13px; color: #8c8c8c; margin-bottom: 8px; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .clear-btn { background: #ff4d4f; color: white; border: none; border-radius: 4px; padding: 3px 10px; font-size: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .clear-btn:hover { background: #ff7875; }
        .ptable-grid { display: grid; grid-template-columns: repeat(18, 1fr); gap: 3px; min-width: 800px; max-width: 1000px; margin: 0 auto; }
        .element { aspect-ratio: 1; background: white; border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.1s ease; color: #595959; }
        .element:hover { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.1); z-index: 2; position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        
        .el-s { border-color: #85a5ff; color: #2f54eb; background: #f0f5ff; }
        .el-p { border-color: #b7eb8f; color: #52c41a; background: #f6ffed; }
        .el-d { border-color: #ffd666; color: #faad14; background: #fffbe6; }
        .el-f { border-color: #ff9c6e; color: #fa541c; background: #fff2e8; }

        /* === 搜索区 === */
        .search-section { background: #f8f9fc; padding: 15px 20px; border-radius: 10px; display: flex; gap: 20px; justify-content: center; align-items: flex-end; margin-bottom: 15px; border: 1px solid #e1e8ed; flex-wrap: wrap; /* 增加换行适配 */ }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 13px; font-weight: 600; color: #595959; }
        input { padding: 9px 15px; border: 1px solid var(--border); border-radius: 6px; width: 200px; font-size: 14px; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
        #search-btn { background: var(--primary); color: white; border: none; padding: 10px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        #search-btn:hover { background: var(--primary-hover); }
        
        /* === 表格区 === */
        .table-area-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #eee; border-radius: 10px; }
        .table-area { flex: 1; overflow: auto; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { text-align: left; padding: 12px 15px; white-space: nowrap; }
        th { position: sticky; top: 0; background: #fafafa; font-size: 14px; font-weight: 600; z-index: 10; border-bottom: 1px solid #e8e8e8; color: #262626;}
        td { border-bottom: 1px solid #f0f0f0; font-size: 14px; color: #595959; }
        tr:hover { background: #f0f5ff; }
        
        #error-banner { display: none; background: #fff2f0; color: #ff4d4f; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; font-size: 13px; border: 1px solid #ffccc7;}

        .action-btns { display: flex; gap: 8px; }
        .view-btn, .download-btn { padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; border: 1px solid transparent; transition: 0.2s; }
        .view-btn { background: #e6f7ff; color: var(--primary); border-color: rgba(24,144,255,0.3); }
        .view-btn:hover { background: var(--primary); color: white; }
        .download-btn { background: #f6ffed; color: var(--success); border-color: rgba(82,196,26,0.3); }
        .download-btn:hover { background: var(--success); color: white; }

        /* === 3D 预览弹窗 === */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 850px; border-radius: 12px; overflow: hidden; box-shadow: 0 15px 50px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .modal-header { padding: 15px 25px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { margin: 0; font-size: 18px; color: #262626;}
        .close-btn { font-size: 26px; cursor: pointer; color: #999; line-height: 1; transition: 0.2s; }
        .close-btn:hover { color: #ff4d4f; }
        .viewer-container { width: 100%; height: 550px; background: white; position: relative; }
        .modal-footer { padding: 15px 25px; background: #fafafa; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #8c8c8c;}
        
        /* === 分页 === */
        .pagination-bar { background: #fafafa; padding: 12px 25px; display: flex; justify-content: space-between; border-top: 1px solid #e8e8e8; align-items: center;}
        .page-btns { display: flex; gap: 6px; }
        .page-link { padding: 5px 12px; border: 1px solid #d9d9d9; border-radius: 4px; cursor: pointer; font-size: 13px; background: white; color: #595959; transition: 0.2s;}
        .page-link:hover { border-color: var(--primary); color: var(--primary); }
        .page-link.active { background: var(--primary); color: white; border-color: var(--primary); }
    </style>
</head>
<body>

<div class="main-card">
    <h1>🔬 材料结构检索平台 </h1>
    
    <div class="ptable-container">
        <div class="ptable-title">
            点击元素组成化学式 <button class="clear-btn" onclick="clearInput()">一键清空输入</button>
        </div>
        <div class="ptable-grid" id="periodic-table-grid"></div>
    </div>

    <div id="error-banner"></div>

    <div class="search-section">
        <div class="input-group">
            <label>Material ID:</label>
            <input type="text" id="mpid-input" placeholder="例如: mp-1234">
        </div>
        
        <div class="input-group">
            <label>化学式 (Formula):</label>
            <input type="text" id="formula-input" placeholder="例如: MoS2">
        </div>
        
        <div class="input-group">
            <label>Stability (E_hull ≤ eV/atom):</label>
            <input type="number" id="energy-input" value="0.05" step="0.01" style="width: 160px;">
        </div>
        <button id="search-btn" onclick="runSearch(1)">立即检索</button>
    </div>

    <div class="table-area-container">
        <div class="table-area">
            <table id="main-table">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="pagination-bar" id="pagination-bar">
            <div id="page-info" style="font-size: 13px; color: #888;">准备就绪，等待检索...</div>
            <div class="page-btns" id="page-btns-container"></div>
        </div>
    </div>
</div>

<div id="viewer-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">Crystal Structure View</h2>
            <span class="close-btn" onclick="closeViewer()">&times;</span>
        </div>
        <div id="gldiv" class="viewer-container"></div>
        <div class="modal-footer">
            <span>支持鼠标左键旋转，滚轮缩放，悬停查看原子坐标。</span>
            <button class="download-btn" id="modal-download-btn">下载 CIF 文件</button>
        </div>
    </div>
</div>

<script>

    let fullDataCache = []; 
    let currentPage = 1;
    let totalPages = 1; 
    const pageSize = 10; 

    // 💡 修复：清空输入时同时清空 ID 和化学式
    function clearInput() { 
        document.getElementById('formula-input').value = ''; 
        document.getElementById('mpid-input').value = ''; 
    }


<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>厂长材料数据库 V2.0 - 全量版</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 30px; background: #f4f7f6; color: #2c3e50; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #1a73e8; font-size: 2.5em; margin-bottom: 10px; }
        
        /* 搜索卡片 */
        .search-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; gap: 20px; align-items: flex-end; justify-content: center; margin-bottom: 30px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 14px; font-weight: 600; color: #5f6368; }
        input { padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; width: 220px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #1a73e8; }
        
        button#searchBtn { background: #1a73e8; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; height: 48px; }
        button#searchBtn:hover { background: #1557b0; transform: translateY(-2px); }
        
        /* 表格样式 */
        .table-container { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 18px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #f8f9fa; font-weight: 600; color: #5f6368; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        tr:hover { background: #f1f8ff; }
        
        .cif-btn { background: #34a853; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; }
        .cif-btn:hover { background: #2d8e47; }
        #status-info { margin-bottom: 15px; font-weight: 500; color: #1a73e8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔬 材料属性全量检索平台</h1>
            <p>基于第一性原理计算的 210,000+ 材料结构数据库</p>
        </div>

        <div class="search-card">
            <div class="input-group">
                <label>化学式 (如 MoS2):</label>
                <input type="text" id="formula" placeholder="支持部分匹配">
            </div>
            <div class="input-group">
                <label>形成能阈值 (≤ eV/atom):</label>
                <input type="number" id="energy" value="0.5" step="0.1">
            </div>
            <button id="searchBtn" onclick="doSearch(1)">🔍 立即检索</button>
        </div>
        
        <div id="status-info">请在上方输入条件开始检索...</div>

        <div class="table-container">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th>MP 编号</th>
                        <th>化学式</th>
                        <th>形成能 (eV/atom)</th>
                        <th>能带 (eV)</th>
                        <th>空间群</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        // 🚨 厂长注意：请务必把这里换成你在 Railway 看到的那个 HTTPS 网址！
        const API_BASE = "https://web-production-61547.up.railway.app"; 

        async function doSearch(page) {
            const formula = document.getElementById('formula').value;
            const energy = document.getElementById('energy').value;
            const statusInfo = document.getElementById('status-info');
            const tbody = document.querySelector('#resultTable tbody');
            
            statusInfo.innerText = "⚡ 正在连接云端服务器，请稍候...";
            tbody.innerHTML = '';

            try {
                const url = `${API_BASE}/search?formula=${encodeURIComponent(formula)}&energy=${energy}&page=${page}`;
                const res = await fetch(url);
                const json = await res.json();
                
                statusInfo.innerText = `✅ 检索成功：找到 ${json.total} 条匹配结果`;
                
                if (json.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">未找到匹配材料</td></tr>';
                    return;
                }

                tbody.innerHTML = json.data.map(item => `
                    <tr>
                        <td><strong>${item['Material ID']}</strong></td>
                        <td>${item['Formula'] || '-'}</td>
                        <td>${item['Predicted Formation Energy (eV/atom)'] || '-'}</td>
                        <td>${item['Band Gap (eV)'] || '-'}</td>
                        <td>${item['Space Group'] || '-'}</td>
                        <td>
                            <button class="cif-btn" onclick="downloadCIF('${item['Material ID']}')">⬇️ 下载 CIF</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error(error);
                statusInfo.innerText = "❌ 访问失败：请检查后端 Railway 是否已成功部署，或 API 网址是否填写正确。";
            }
        }

        async function downloadCIF(mpid) {
            try {
                const res = await fetch(`${API_BASE}/get_cif?mpid=${mpid}`);
                if (!res.ok) throw new Error("文件不存在");
                const data = await res.json();
                
                if (data.cif) {
                    const blob = new Blob([data.cif], { type: 'text/plain' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${mpid}.cif`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                }
            } catch (error) {
                alert("下载失败：该材料可能在数据库中缺失 CIF 结构文本。");
            }
        }
    </script>
</body>
</html>

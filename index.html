<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>厂长材料数据库 V2.0 - 动态适配版</title>
    <style>
        :root { --primary: #007bff; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }
        
        .search-box { display: flex; gap: 15px; justify-content: center; align-items: flex-end; margin-bottom: 30px; flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 180px; font-size: 14px; }
        button { padding: 10px 25px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background: #0056b3; transform: translateY(-1px); }
        
        .table-container { overflow-x: auto; margin-top: 20px; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f1f4f9; color: #555; font-weight: 600; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:hover { background-color: #fcfdfe; }

        #status-msg { text-align: center; padding: 15px; border-radius: 6px; display: none; margin: 10px 0; }
        .error { background: #fff1f0; color: #ff4d4f; border: 1px solid #ffccc7; }
        .btn-download { background: #28a745; font-size: 12px; padding: 5px 10px; }
        .btn-download:hover { background: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔬 材料属性全量检索平台</h1>
    
    <div class="search-box">
        <div class="input-group">
            <label>化学式 (如 CaO):</label>
            <input type="text" id="formula-input" placeholder="输入化学式...">
        </div>
        <div class="input-group">
            <label>形成能阈值 (≤ eV/atom):</label>
            <input type="number" id="energy-input" value="0.5" step="0.1">
        </div>
        <button id="search-btn" onclick="doSearch(1)">立即检索</button>
    </div>

    <div id="status-msg" class="error">❌ 访问失败：云端服务器可能正在重启，请稍等 1 分钟后重试。</div>

    <div class="table-container">
        <table id="result-table">
            <thead>
                </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    // 🚨 厂长注意：请务必确认这是你最新的 Railway 域名
    const API_BASE = "https://web-production-61547.up.railway.app";

    async function doSearch(page = 1) {
        const formula = document.getElementById('formula-input').value.trim();
        const energy = document.getElementById('energy-input').value;
        const btn = document.getElementById('search-btn');
        const status = document.getElementById('status-msg');

        btn.innerText = "🔍 检索中...";
        btn.disabled = true;
        status.style.display = 'none';

        try {
            // 构造请求网址
            const url = `${API_BASE}/search?formula=${formula}&energy=${energy}&page=${page}`;
            const response = await fetch(url);
            
            if (!response.ok) throw new Error('Backend Error');
            
            const result = await response.json();
            renderTable(result.data); // 调用动态渲染函数
            
        } catch (error) {
            console.error("检索出错:", error);
            status.style.display = 'block';
        } finally {
            btn.innerText = "立即检索";
            btn.disabled = false;
        }
    }

    function renderTable(data) {
        const thead = document.querySelector('#result-table thead');
        const tbody = document.querySelector('#result-table tbody');
        
        thead.innerHTML = '';
        tbody.innerHTML = '';

        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;">未找到匹配的数据记录</td></tr>';
            return;
        }

        // 💡 核心：动态表头逻辑 (扫描仪模式)
        // Object.keys(data[0]) 会自动抓取后端发来的所有属性名（如 Formula, Total Energy 等）
        const columns = Object.keys(data[0]); 
        
        let headHtml = '<tr>';
        columns.forEach(col => {
            headHtml += `<th>${col}</th>`;
        });
        headHtml += '<th>操作</th></tr>';
        thead.innerHTML = headHtml;

        // 💡 核心：动态行生成
        data.forEach(item => {
            let rowHtml = '<tr>';
            columns.forEach(col => {
                // 如果数据是 null 显示横杠
                const val = item[col] !== null ? item[col] : '-';
                rowHtml += `<td>${val}</td>`;
            });
            
            // 操作列：下载按钮
            const mpid = item['Material ID']; // 假设这一列永远存在
            rowHtml += `<td><button class="btn-download" onclick="downloadCIF('${mpid}')">下载 CIF</button></td>`;
            rowHtml += '</tr>';
            tbody.innerHTML += rowHtml;
        });
    }

    async function downloadCIF(mpid) {
        if(!mpid) return;
        try {
            const res = await fetch(`${API_BASE}/get_cif?mpid=${mpid}`);
            const json = await res.json();
            
            if (!json.cif) {
                alert(`⚠️ 下载失败！该材料 [${mpid}] 在数据库中没有关联的 CIF 结构文件。`);
                return;
            }

            // 创建 Blob 对象并触发浏览器下载
            const blob = new Blob([json.cif], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${mpid}.cif`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        } catch (e) {
            alert("下载请求失败，请检查 Railway 后端日志。");
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>材料结构检索平台 - V3.0 </title>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <style>
        :root { 
            --primary: #1890ff; 
            --success: #52c41a;
            --bg: #f0f2f5; 
            --card-bg: #ffffff;
            --border: #e8e8e8;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
        }

        /* 💡 主容器：大屏居中且高效利用空间 */
        .app-container {
            width: 98%;
            max-width: 1600px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 15px 20px;
        }

        header { display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 20px; color: #001529; }

        /* 周期表：紧凑布局 */
        .ptable-grid {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 4px;
        }
        .element {
            min-height: 40px;
            aspect-ratio: 1;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: 0.15s;
        }
        .element:hover { background: var(--primary); color: white; transform: scale(1.15); z-index: 5; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .el-s { background: #f0f5ff; } .el-p { background: #f6ffed; } 
        .el-d { background: #fffbe6; } .el-f { background: #fff2e8; }

        /* 搜索栏：横向排列 */
        .search-bar {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            justify-content: center;
            flex-wrap: wrap;
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 180px; max-width: 280px; }
        .input-group label { font-size: 12px; color: #8c8c8c; font-weight: 600; }
        .input-group input { 
            padding: 8px 12px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 14px;
            width: 100%;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 6px;
            border: 1px solid transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { background: #bfbfbf; cursor: not-allowed; }
        .btn-success { background: #f6ffed; color: var(--success); border-color: #b7eb8f; }
        .btn-success:hover { background: var(--success); color: white; }
        .btn-ghost { background: #fff; border-color: var(--primary); color: var(--primary); }
        .btn-ghost:hover { background: var(--primary); color: white; }

        /* 💡 表格居中与空间优化 */
        .table-container { min-height: 480px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: #fafafa; 
            padding: 12px; 
            border-bottom: 2px solid #f0f0f0; 
            color: #262626; 
            text-align: center; /* 字在中间 */
        }
        td { 
            padding: 12px; 
            border-bottom: 1px solid #f0f0f0; 
            text-align: center; /* 字在中间 */
            font-size: 14px;
        }
        tr:hover { background: #f0f7ff; }

        /* 分页器：居中显示 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
        }
        .page-num {
            min-width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            padding: 0 5px;
        }
        .page-num.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* 💡 全屏弹窗与关闭逻辑 */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none; /* 默认隐藏 */
            z-index: 10000;
            padding: 30px;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #gldiv { flex: 1; width: 100%; border-radius: 0 0 12px 12px; position: relative; }
        
        /* 加载动画 */
        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 5;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .modal-header {
            padding: 15px 25px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="section-card">
        <h1>🔬 材料结构检索平台 <small style="color:#999; font-weight:normal; font-size:12px;">V5.0 Ultra</small></h1>
        <button class="btn" style="background:#ff4d4f; color:white;" onclick="resetFields()">清空条件</button>
    </header>

    <div class="section-card">
        <div class="ptable-grid" id="ptable"></div>
    </div>

    <div class="section-card">
        <div class="search-bar">
            <div class="input-group">
                <label>Material ID</label>
                <input type="text" id="mpid-input" placeholder="例如: mp-1234">
            </div>
            <div class="input-group">
                <label>化学式 (Formula)</label>
                <input type="text" id="formula-input" placeholder="点击上方元素或输入">
            </div>
            <div class="input-group">
                <label>稳定性 (E_hull ≤)</label>
                <input type="number" id="energy-input" value="0.05" step="0.01">
            </div>
            <button class="btn btn-primary" id="search-btn" onclick="executeSearch(1)">立即检索</button>
        </div>
    </div>

    <div class="section-card">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Material ID</th>
                        <th>化学式</th>
                        <th>生成能 (eV/atom)</th>
                        <th>能隙 (eV)</th>
                        <th>空间群</th>
                        <th>E_hull</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr><td colspan="7" style="color:#bfbfbf; padding:100px;">等待输入条件并点击检索...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<div id="modal" class="modal" onclick="handleOverlayClick(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div>
                <h2 id="m-title" style="margin:0; font-size:18px;">结构预览</h2>
                <span style="font-size:12px; color:#888;">快捷键：Esc 退出 | 鼠标划过原子显示坐标</span>
            </div>
            <div style="display:flex; gap:12px; align-items:center;">
                <button class="btn btn-success" id="dl-btn-modal">💾 下载 CIF</button>
                <button class="btn" style="background:#eee; padding:5px 10px;" onclick="closeModal()">关闭 (Esc)</button>
            </div>
        </div>
        <div id="gldiv">
            <div id="loader">
                <div class="spinner"></div>
                <div style="color:var(--primary); font-weight:bold;">正在从云端调取结构...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://web-production-61547.app.railway.app"; // 请确保地址准确
    const API = "https://web-production-61547.up.railway.app";
    const PAGE_SIZE = 8; 
    let globalData = [];
    let viewer = null;

    // 💡 提速优化：页面加载后先初始化周期表
    window.onload = () => { 
        initPtable(); 
        executeSearch(1); 
    };

    // 快捷键监听：Esc 关闭预览
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });

    function initPtable() {
        const grid = document.getElementById('ptable');
        const elements = [
            ["H",1,1,"s"], ["He",18,1,"p"], ["Li",1,2,"s"], ["Be",2,2,"s"], ["B",13,2,"p"], ["C",14,2,"p"], ["N",15,2,"p"], ["O",16,2,"p"], ["F",17,2,"p"], ["Ne",18,2,"p"],
            ["Na",1,3,"s"], ["Mg",2,3,"s"], ["Al",13,3,"p"], ["Si",14,3,"p"], ["P",15,3,"p"], ["S",16,3,"p"], ["Cl",17,3,"p"], ["Ar",18,3,"p"], ["K",1,4,"s"], ["Ca",2,4,"s"],
            ["Sc",3,4,"d"], ["Ti",4,4,"d"], ["V",5,4,"d"], ["Cr",6,4,"d"], ["Mn",7,4,"d"], ["Fe",8,4,"d"], ["Co",9,4,"d"], ["Ni",10,4,"d"], ["Cu",11,4,"d"], ["Zn",12,4,"d"],
            ["Ga",13,4,"p"], ["Ge",14,4,"p"], ["As",15,4,"p"], ["Se",16,4,"p"], ["Br",17,4,"p"], ["Kr",18,4,"p"], ["Rb",1,5,"s"], ["Sr",2,5,"s"], ["Y",3,5,"d"], ["Zr",4,5,"d"],
            ["Nb",5,5,"d"], ["Mo",6,5,"d"], ["Tc",7,5,"d"], ["Ru",8,5,"d"], ["Rh",9,5,"d"], ["Pd",10,5,"d"], ["Ag",11,5,"d"], ["Cd",12,5,"d"], ["In",13,5,"p"], ["Sn",14,5,"p"],
            ["Sb",15,5,"p"], ["Te",16,5,"p"], ["I",17,5,"p"], ["Xe",18,5,"p"], ["Cs",1,6,"s"], ["Ba",2,6,"s"], ["Lu",3,6,"d"], ["Hf",4,6,"d"], ["Ta",5,6,"d"], ["W",6,6,"d"],
            ["Re",7,6,"d"], ["Os",8,6,"d"], ["Ir",9,6,"d"], ["Pt",10,6,"d"], ["Au",11,6,"d"], ["Hg",12,6,"d"], ["Tl",13,6,"p"], ["Pb",14,6,"p"], ["Bi",15,6,"p"], ["Po",16,6,"p"],
            ["At",17,6,"p"], ["Rn",18,6,"p"], ["La",4,8,"f"], ["Ce",5,8,"f"], ["Pr",6,8,"f"], ["Nd",7,8,"f"], ["Pm",8,8,"f"], ["Sm",9,8,"f"], ["Eu",10,8,"f"], ["Gd",11,8,"f"],
            ["Tb",12,8,"f"], ["Dy",13,8,"f"], ["Ho",14,8,"f"], ["Er",15,8,"f"], ["Tm",16,8,"f"], ["Yb",17,8,"f"]
        ];
        elements.forEach(el => {
            const d = document.createElement('div');
            d.className = `element el-${el[3]}`;
            d.style.gridColumn = el[1]; d.style.gridRow = el[2];
            d.innerText = el[0];
            d.onclick = () => document.getElementById('formula-input').value += el[0];
            grid.appendChild(d);
        });
    }

    function resetFields() {
        document.getElementById('formula-input').value = '';
        document.getElementById('mpid-input').value = '';
    }

    // 💡 提速反馈：增加加载状态提示
    async function executeSearch(page) {
        const btn = document.getElementById('search-btn');
        btn.innerText = "🚀 检索中..."; btn.disabled = true;
        
        const mid = document.getElementById('mpid-input').value;
        const fm = document.getElementById('formula-input').value;
        const eg = document.getElementById('energy-input').value;
        
        try {
            const res = await fetch(`${API}/search?formula=${fm}&energy=${eg}&mpid=${mid}`);
            const data = await res.json();
            globalData = data.data || data;
            renderTable(page);
        } catch(e) { 
            alert("后端正在热身中，首次检索可能需要 15 秒，请重试。"); 
        } finally {
            btn.innerText = "立即检索"; btn.disabled = false;
        }
    }

    function renderTable(page) {
        const start = (page - 1) * PAGE_SIZE;
        const slice = globalData.slice(start, start + PAGE_SIZE);
        const tbody = document.getElementById('tbody');
        
        if(slice.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="padding:100px; color:#999;">无匹配数据</td></tr>';
            return;
        }

        tbody.innerHTML = slice.map(item => `
            <tr>
                <td>${item['Material ID']}</td>
                <td><b>${item['Formula']}</b></td>
                <td>${Number(item['Predicted Formation Energy (eV/atom)']).toFixed(3)}</td>
                <td>${Number(item['Band Gap (eV)']).toFixed(3)}</td>
                <td>${item['Space Group']}</td>
                <td>${Number(item['Energy Above Hull (eV/atom)']).toFixed(3)}</td>
                <td style="display:flex; gap:5px; justify-content:center;">
                    <button class="btn btn-ghost" style="padding:4px 10px; font-size:12px;" onclick="open3D('${item['Material ID']}', '${item['Formula']}')">预览</button>
                    <button class="btn btn-success" style="padding:4px 10px; font-size:12px;" onclick="downloadCIF('${item['Material ID']}')">CIF</button>
                </td>
            </tr>
        `).join('');

        const totalPages = Math.ceil(globalData.length / PAGE_SIZE);
        let pHTML = '';
        for(let i=1; i<=totalPages; i++) {
            pHTML += `<div class="page-num ${i===page?'active':''}" onclick="renderTable(${i})">${i}</div>`;
        }
        document.getElementById('pagination').innerHTML = pHTML;
    }

    async function downloadCIF(mpid) {
        try {
            const res = await fetch(`${API}/get_cif?mpid=${mpid}`);
            const data = await res.json();
            const blob = new Blob([data.cif], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${mpid}.cif`; a.click();
        } catch(e) { alert("下载失败"); }
    }

    async function open3D(mpid, formula) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('m-title').innerText = `正在加载 ${formula}...`;

        if(!viewer) viewer = $3Dmol.createViewer("gldiv", { backgroundColor: 'white' });
        viewer.clear();

        try {
            const res = await fetch(`${API}/get_cif?mpid=${mpid}`);
            const data = await res.json();
            
            // 💡 提速配置：如果你觉得渲染慢，把 supercell [2,2,2] 改成 [1,1,1]
            viewer.addModel(data.cif, "cif", { supercell: [2, 2, 2] });
            viewer.setStyle({}, { sphere: { radius: 0.5 }, stick: { radius: 0.15 } });
            
            viewer.setHoverable({}, true, 
                function(atom, v) {
                    if(!atom.label) {
                        atom.label = v.addLabel(`${atom.elem}: (${atom.x.toFixed(2)}, ${atom.y.toFixed(2)}, ${atom.z.toFixed(2)})`, 
                            { position: atom, backgroundColor: '#333', fontColor: 'white' });
                    }
                },
                function(atom, v) { if(atom.label) { v.removeLabel(atom.label); delete atom.label; } }
            );

            viewer.addUnitCell();
            viewer.zoomTo();
            viewer.render();
            document.getElementById('m-title').innerText = `${formula} - 结构预览`;
        } catch(e) {
            document.getElementById('m-title').innerText = "加载失败";
        } finally {
            document.getElementById('loader').style.display = 'none';
        }

        document.getElementById('dl-btn-modal').onclick = () => downloadCIF(mpid);
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function handleOverlayClick(e) { if(e.target.id === 'modal') closeModal(); }
</script>
</body>
</html>
